name: SGYT Supreme Omni-Modder

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Pixeldrain Link or Direct APK URL'
        required: true
        default: 'https://pixeldrain.dev/u/1xznptdr'

jobs:
  build-mod:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Install Android Build Tools & JSON Parser
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq

      - name: 4. Download APKEditor CLI
        run: |
          wget -qO APKEditor.jar https://github.com/REAndroid/APKEditor/releases/download/V1.4.7/APKEditor-1.4.7.jar

      - name: 5. Smart Download APK
        run: |
          RAW_URL="${{ github.event.inputs.apk_url }}"
          if [[ "$RAW_URL" == *"pixeldrain."*"/u/"* ]]; then
              DIRECT_URL="${RAW_URL/\/u\//\/api\/file\/}"
          else
              DIRECT_URL="$RAW_URL"
          fi
          wget -O target_game.apk "$DIRECT_URL"

      - name: 6. Decompile APK
        run: |
          java -jar APKEditor.jar d -i target_game.apk -o extracted_apk

      - name: 7. Master SGYT Omni-Mod Injection
        run: |
          # Locate the actual game directory
          GAME_PATH=$(find extracted_apk -name "options.rpyc" -exec dirname {} \;)
          if [ -z "$GAME_PATH" ]; then
            GAME_PATH=$(find extracted_apk -name "script.rpyc" -exec dirname {} \;)
          fi
          if [ -z "$GAME_PATH" ]; then
            GAME_PATH="extracted_apk/assets/game"
          fi
          
          mkdir -p "$GAME_PATH"

          cat << 'EOF' > "$GAME_PATH/999_sgyt_master_mod.rpy"
          init -999 python:
              # Force unlock the developer engine
              config.developer = True
              config.console = True
              
              # Force hardware keyboard shortcuts for Master SGYT
              if 'console' in config.keymap:
                  config.keymap['console'].append('shift_K_o')
                  config.keymap['console'].append('K_F1')
              else:
                  config.keymap['console'] = ['shift_K_o', 'K_F1']

          screen sgyt_console_trigger():
              zorder 2000
              drag:
                  draggable True
                  xpos 0.8
                  ypos 0.1
                  frame:
                      background Solid("#000000AA")
                      padding (15, 15)
                      vbox:
                          spacing 10
                          # The Touch Console Button
                          textbutton "SGYT CONSOLE":
                              action Show("_console")
                              text_size 35
                              text_color "#00FF00"
                              text_hover_color "#FFFFFF"
                          
                          # The Auto-Wealth Cheat Button
                          textbutton "QUICK WEALTH":
                              action Function(sgyt_inject_wealth)
                              text_size 25
                              text_color "#FFD700"
                              text_hover_color "#FFFFFF"

          init 999 python:
              def sgyt_inject_wealth():
                  # Scans the game's variables and maxes out the currency
                  currencies = ['money', 'gold', 'cash', 'coins', 'credits', 'wealth', 'ryo', 'yen', 'dollars']
                  for var in currencies:
                      if hasattr(store, var):
                          if isinstance(getattr(store, var), int):
                              setattr(store, var, getattr(store, var) + 99999)
                  renpy.notify("Master SGYT's Wealth Injected!")

              def sgyt_force_show():
                  if not renpy.get_screen("sgyt_console_trigger"):
                      renpy.show_screen("sgyt_console_trigger")
              
              config.overlay_functions.append(sgyt_force_show)
          EOF
          echo "[+] Master's Omni-Mod injected into $GAME_PATH"

      - name: 8. Recompile APK
        run: |
          java -jar APKEditor.jar b -i extracted_apk -o modded_unaligned.apk

      - name: 9. Align and Sign APK
        run: |
          zipalign -p -f 4 modded_unaligned.apk modded_aligned.apk
          keytool -genkey -v -keystore sgyt-release.keystore -alias sgyt_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "master_sgyt" -keypass "master_sgyt" -dname "CN=SGYT, OU=Modder, O=SGYT, L=Agra, S=UP, C=IN"
          apksigner sign --ks sgyt-release.keystore --ks-pass pass:master_sgyt --out FINAL_MODDED_GAME.apk modded_aligned.apk

      - name: 10. Authenticated Upload to Pixeldrain
        run: |
          RESPONSE=$(curl -s -T FINAL_MODDED_GAME.apk -u ":${{ secrets.PIXELDRAIN_API_KEY }}" "https://pixeldrain.com/api/file/SGYT_Modded_Game.apk")
          FILE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -n "$FILE_ID" ] && [ "$FILE_ID" != "null" ]; then
              echo "======================================================="
              echo " [SUCCESS] MASTER SGYT'S OMNI-MOD IS READY!"
              echo " Pixeldrain Link: https://pixeldrain.com/u/$FILE_ID"
              echo "======================================================="
          else
              echo "Upload failed. Response: $RESPONSE"
              exit 1
          fi

      - name: 11. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SGYT_Modded_Game_Omni
          path: FINAL_MODDED_GAME.apk
