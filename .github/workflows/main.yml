name: SGYT Supreme Ren'Py Modder

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Pixeldrain Link or Direct APK URL'
        required: true
        default: 'https://pixeldrain.dev/u/1xznptdr'

jobs:
  build-mod:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Install Android Build Tools & JSON Parser
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jq

      - name: 4. Download APKEditor CLI
        run: |
          wget -qO APKEditor.jar https://github.com/REAndroid/APKEditor/releases/download/V1.4.7/APKEditor-1.4.7.jar

      - name: 5. Smart Download & Verify Target Game APK
        run: |
          RAW_URL="${{ github.event.inputs.apk_url }}"
          
          # Automatically convert ANY Pixeldrain link to a direct API download
          if [[ "$RAW_URL" == *"pixeldrain."*"/u/"* ]]; then
              DIRECT_URL="${RAW_URL/\/u\//\/api\/file\/}"
              echo "[+] Master SGYT provided a Pixeldrain link. Converting:"
              echo "[+] $DIRECT_URL"
          else
              DIRECT_URL="$RAW_URL"
          fi
          
          echo "[+] Fetching the APK..."
          wget -O target_game.apk "$DIRECT_URL"
          
          echo "[+] Download complete. Verifying file integrity..."
          FILESIZE=$(stat -c%s "target_game.apk")
          if [ $FILESIZE -lt 10000000 ]; then
            echo "[-] ERROR: The downloaded file is only $FILESIZE bytes!"
            echo "[-] The host blocked the download. Please ensure the link is correct."
            exit 1
          fi
          echo "[+] SUCCESS: APK verified. Proceeding with Master's modifications."

      - name: 6. Decompile APK
        run: |
          java -jar APKEditor.jar d -i target_game.apk -o extracted_apk

      - name: 7. Inject Dev Console Mod Directly
        run: |
          mkdir -p extracted_apk/assets/game
          cat << 'EOF' > extracted_apk/assets/game/999_sgyt_console_mod.rpy
          init 999 python:
              config.developer = True
              config.console = True

          screen mobile_console_btn():
              zorder 100
              textbutton "DEV CONSOLE":
                  action Show("_console")
                  xalign 1.0
                  yalign 0.0
                  text_size 30
                  text_color "#00ff00"
                  text_outlines [ (2, "#000000", 0, 0) ]

          init python:
              config.overlay_screens.append("mobile_console_btn")
          EOF
          echo "[+] SGYT Mod injected successfully."

      - name: 8. Recompile APK
        run: |
          java -jar APKEditor.jar b -i extracted_apk -o modded_unaligned.apk

      - name: 9. Align and Sign APK
        run: |
          zipalign -p -f 4 modded_unaligned.apk modded_aligned.apk
          keytool -genkey -v -keystore sgyt-release.keystore -alias sgyt_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "master_sgyt" -keypass "master_sgyt" -dname "CN=SGYT, OU=Modder, O=SGYT, L=Agra, S=UP, C=IN"
          apksigner sign --ks sgyt-release.keystore --ks-pass pass:master_sgyt --out FINAL_MODDED_GAME.apk modded_aligned.apk

      - name: 10. Authenticated Upload to Pixeldrain
        run: |
          echo "[+] Uploading FINAL_MODDED_GAME.apk to Pixeldrain for Master SGYT..."
          
          if [ -z "${{ secrets.PIXELDRAIN_API_KEY }}" ]; then
              echo "[-] ERROR: API Key is missing! Master, please add PIXELDRAIN_API_KEY to your GitHub Secrets."
              exit 1
          fi
          
          # Push the file to Pixeldrain's upload API using Basic Authentication
          RESPONSE=$(curl -s -T FINAL_MODDED_GAME.apk -u ":${{ secrets.PIXELDRAIN_API_KEY }}" "https://pixeldrain.com/api/file/SGYT_Modded_Game.apk")
          echo "$RESPONSE" > response.json
          
          # Extract the success status and new File ID from the JSON
          SUCCESS=$(jq -r '.success // empty' response.json)
          FILE_ID=$(jq -r '.id // empty' response.json)
          
          if [ "$SUCCESS" = "true" ] && [ -n "$FILE_ID" ]; then
              DOWNLOAD_LINK="https://pixeldrain.com/u/$FILE_ID"
              echo "======================================================="
              echo " [SUCCESS] MASTER SGYT'S GAME IS READY!"
              echo " Pixeldrain Link: $DOWNLOAD_LINK"
              echo "======================================================="
          else
              echo "======================================================="
              echo " [?] UPLOAD FAILED."
              echo " Raw Response: $RESPONSE"
              echo "======================================================="
              exit 1
          fi

      - name: 11. Upload GitHub Artifact (Failsafe Backup)
        uses: actions/upload-artifact@v4
        with:
          name: SGYT_Modded_Game
          path: FINAL_MODDED_GAME.apk
